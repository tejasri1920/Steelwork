# .github/workflows/codeql.yml
#
# GitHub Code Scanning — CodeQL analysis.
#
# What it does:
#   Runs GitHub's CodeQL static analysis engine against the Python backend
#   and the JavaScript/TypeScript frontend to detect security vulnerabilities
#   (e.g. SQL injection, XSS, path traversal, insecure deserialization).
#
# When it runs:
#   • On every pull request targeting any branch      — catches issues before merge.
#   • On every push to main                           — baseline reference scan.
#   • On a weekly schedule (Monday 07:00 UTC)         — detects newly published CVEs
#                                                        in the existing codebase even
#                                                        when no code has changed.
#
# Results appear in:
#   GitHub → Security → Code scanning alerts
#
# Languages analysed:
#   python     — FastAPI backend (backend/app/)
#   javascript — React/TypeScript frontend (frontend/src/)
#                CodeQL analyses TypeScript via the javascript query pack.
#
# Query suite:
#   security-extended — the default suite plus additional high-confidence
#   security queries.  Broader coverage than "security-and-quality" while
#   keeping false-positive noise low.

name: CodeQL

on:
  push:
    branches:
      - main                    # Scan every push to the stable baseline branch
  pull_request:
    branches:
      - "**"                    # Scan every PR regardless of target branch
  schedule:
    # Weekly scan — detects newly published CVEs in unchanged code.
    # Cron format: minute hour day-of-month month day-of-week (UTC)
    - cron: "0 7 * * 1"         # Every Monday at 07:00 UTC

jobs:
  analyse:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest

    # ── Permissions ───────────────────────────────────────────────────────────
    # security-events: write  — required to upload SARIF results to the
    #                           Security tab.
    # actions: read           — required for private repos to read workflow
    #                           metadata during analysis.
    # contents: read          — required to checkout the repository.
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      # fail-fast: false — if python analysis fails, javascript analysis still
      # runs (and vice versa).  Both results are useful independently.
      fail-fast: false
      matrix:
        language:
          - python       # Covers backend/app/ (FastAPI, SQLAlchemy, Pydantic)
          - javascript   # Covers frontend/src/ (React, TypeScript, axios)

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Initialise CodeQL ────────────────────────────────────────────────
      # Downloads the CodeQL CLI and query packs for the target language.
      # The "security-extended" suite provides broad vulnerability coverage:
      #   - Injection flaws (SQL, command, path)
      #   - Insecure randomness and cryptography
      #   - Information exposure
      #   - SSRF, open redirect, XSS (for JS)
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # ── 3. Auto-build ───────────────────────────────────────────────────────
      # For Python: CodeQL traces imports directly — no build step needed.
      # For JavaScript/TypeScript: CodeQL extracts the source without running
      # npm install, so no Node.js setup is required here.
      #
      # If auto-build fails for a compiled language (e.g. Java, C++), replace
      # this step with explicit build commands.
      - name: Auto-build
        uses: github/codeql-action/autobuild@v3

      # ── 4. Perform analysis ─────────────────────────────────────────────────
      # Runs the selected query suite against the extracted database and
      # uploads the results as a SARIF file to GitHub Security.
      # Results are visible in: repo → Security → Code scanning alerts.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          # "category" scopes the results so Python and JavaScript alerts are
          # displayed and filtered separately in the Security tab.
          category: "/language:${{ matrix.language }}"
